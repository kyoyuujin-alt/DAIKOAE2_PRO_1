function exportExcel(member, wk, tasks){
  var rows = [["\u7d44\u54e1","\u9031\u5225","\u54c1\u724c","\u4efb\u52d9\u5167\u5bb9","\u96e3\u6613\u5ea6","\u72c0\u614b","\u8ca0\u8377\u5206"]];
  var total = tSc(tasks);
  tasks.forEach(function(t){
    rows.push([member, wk, t.br, t.tx, t.df, t.st, DF[t.df]?DF[t.df].sc:1]);
  });
  // Add blank row
  rows.push([]);
  // Add stats
  rows.push(["\u96e3\u6613\u5ea6\u5360\u6bd4","","","","",""]);
  Object.entries(DF).forEach(function(entry){
    var d=entry[0];
    var cnt=tasks.filter(function(t){return t.df===d;}).length;
    var pct=tasks.length?Math.round(cnt/tasks.length*100):0;
    rows.push([d, cnt+"\u9805", pct+"%","","",""]);
  });
  rows.push(["\u7e3d\u8ca0\u8377\u5206\u6578", total+"\u5206","","","",""]);

  // Build CSV
  var csv = rows.map(function(r){
    return r.map(function(cell){
      var s = String(cell===null||cell===undefined?"":cell);
      if(s.indexOf(",")>=0||s.indexOf("\n")>=0||s.indexOf("\"")>=0){
        s = "\""+s.replace(/\"/g,"\"\"")+"\"";
      }
      return s;
    }).join(",");
  }).join("\n");

  // Add BOM for Excel UTF-8
  var bom = "\uFEFF";
  var blob = new Blob([bom+csv], {type:"text/csv;charset=utf-8;"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = member+"_"+wk+"_\u4efb\u52d9.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function App(){
  var tState=useState([]); var tasks=tState[0]; var setTasks=tState[1];
  var pState=useState([]); var projects=pState[0]; var setProjects=pState[1];
  var mState=useState([]); var messages=mState[0]; var setMessages=mState[1];
  var mTabState=useState("week"); var mainTab=mTabState[0]; var setMainTab=mTabState[1];
  var memState=useState(null); var member=memState[0]; var setMember=memState[1];

  useEffect(function(){
    var unsubM=db.collection("messages").orderBy("createdAt","desc").onSnapshot(function(snap){
      setMessages(snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}));
    });
    var unsubT=db.collection("tasks").onSnapshot(function(snap){
      setTasks(snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}));
    });
    var unsubP=db.collection("projects").onSnapshot(function(snap){
      setProjects(snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}));
    });
    return function(){unsubM();unsubT();unsubP();};
  },[]);

  function upSt(id,st){db.collection("tasks").doc(id).update({st:st});}
  function upDf(id,df){db.collection("tasks").doc(id).update({df:df});}
  function upEdit(id,tx){db.collection("tasks").doc(id).update({tx:tx});}
  function del(id){db.collection("tasks").doc(id).delete();}
  function add(fm){db.collection("tasks").add(Object.assign({},fm,{createdAt:Date.now()}));}
  function addProj(p){
    // Save the project
    db.collection("projects").add(Object.assign({},p,{createdAt:Date.now()}));
    // Auto-generate weekly tasks for each member and each week in range
    var startDate = new Date(p.s);
    var endDate = new Date(p.e);
    // Find all mondays in range
    var d = new Date(startDate);
    // Move to nearest monday on or after start
    var day = d.getDay();
    var diff = day===0 ? 1 : (day===1 ? 0 : 8-day);
    d.setDate(d.getDate() + diff);
    // Generate tasks for each week
    while(d <= endDate){
      var wkId = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");
      (p.ms||[]).forEach(function(member){
        db.collection("tasks").add({
          m: member,
          br: p.br,
          tx: "["+p.nm+"] \u672c\u9031\u9032\u5ea6",
          df: "",
          st: "\u5f85\u8fa6",
          cy: false,
          wk: wkId,
          isDemo: false,
          fromProject: true,
          createdAt: Date.now()
        });
      });
      d.setDate(d.getDate()+7);
    }
  }
  function delProj(id){db.collection("projects").doc(id).delete();}
  function updProj(id,draft){db.collection("projects").doc(id).update(draft);}
  function addMsg(m){db.collection("messages").add(Object.assign({},m,{wk:CW,createdAt:Date.now()}));}
  function likeMsg(id,name){
    if(!name)return;
    var msg=messages.find(function(m){return m.id===id;});
    if(!msg)return;
    var likes=msg.likes||[];
    var newLikes=likes.includes(name)?likes.filter(function(n){return n!==name;}):[].concat(likes,[name]);
    db.collection("messages").doc(id).update({likes:newLikes});
  }
  function delMsg(id){db.collection("messages").doc(id).delete();}

  var wt=tasks.filter(function(t){return t.wk===CW;});
  var totPct=wt.length?Math.round(wt.filter(function(t){return t.st==="\u5b8c\u6210";}).length/wt.length*100):0;

  if(member) return h(MemberPage,{member:member,tasks:tasks,projects:projects,onSt:upSt,onDf:upDf,onDel:del,onEdit:upEdit,onAdd:add,onAddProj:addProj,onDelProj:delProj,onUpdProj:updProj,onBack:function(){setMember(null);}});

  return h("div",{style:{minHeight:"100vh",background:"#F8FAFC"}},
    h("div",{style:{background:"#0F172A",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}},
      h("div",null,
        h("div",{style:{fontSize:16,fontWeight:800,color:"#fff",letterSpacing:"-.3px"}},"\u516d\u9ede\u4e0b\u73ed\u4e2d \u7dda\u4e0a\u5de5\u4f5c\u7ad9"),
        h("div",{style:{fontSize:11,color:"#475569",marginTop:2}},THIS_YEAR+"\u5e74")
      ),
      h("div",{style:{display:"flex",gap:6,alignItems:"center"}},
        h("span",{style:{fontSize:11,color:"#10B981",background:"#064E3B",padding:"3px 10px",borderRadius:99}},"\u672c\u9031 "+totPct+"%"),
        h("span",{style:{fontSize:11,color:"#38BDF8",background:"#0C4A6E",padding:"3px 10px",borderRadius:99}},"\ud83d\udccc "+projects.length+" \u5e36\u72c0\u6848\u4ef6"),
        h("a",{href:"guide.html",target:"_blank",style:{fontSize:11,color:"#A3E635",background:"#1A2E05",padding:"3px 10px",borderRadius:99,textDecoration:"none",fontWeight:700}},"\ud83d\udcd6 \u4f7f\u7528\u8aaa\u660e")
      )
    ),
    h("div",{style:{background:"#fff",borderBottom:"1px solid #E5E7EB",padding:"0 20px",display:"flex"}},
      [["week","\ud83d\udccb \u672c\u9031"],["monthly","\ud83d\udcca \u6708\u5225\u56de\u9867"]].map(function(arr){
        var id=arr[0], lb=arr[1];
        return h("button",{key:id,onClick:function(){setMainTab(id);},style:{padding:"11px 18px",fontSize:13,fontWeight:700,border:"none",background:"transparent",color:mainTab===id?"#1D4ED8":"#9CA3AF",borderBottom:mainTab===id?"2px solid #1D4ED8":"2px solid transparent",whiteSpace:"nowrap",cursor:"pointer"}},lb);
      })
    ),
    mainTab==="week"
      ?h(WeekView,{tasks:tasks,projects:projects,messages:messages,onPick:setMember,onSt:upSt,onDf:upDf,onEdit:upEdit,onAddProj:addProj,onDelProj:delProj,onUpdProj:updProj,onAddMsg:addMsg,onLikeMsg:likeMsg,onDelMsg:delMsg})
      :h(MonthlyView,{tasks:tasks,projects:projects,messages:messages,onSt:upSt,onDf:upDf,onEdit:upEdit,onUpdProj:updProj,onAddMsg:addMsg,onLikeMsg:likeMsg,onDelMsg:delMsg})
  );
}

ReactDOM.render(h(App),document.getElementById("app"));
</script>
</body>
</html>
